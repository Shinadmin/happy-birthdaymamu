<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <div id="screen-1" class="screen active">
        <h2>I have a gift for you...</h2>
        <button id="heart-btn" class="pixel-btn">
            <span class="heart-icon">❤️</span> กดเลย!
        </button>
    </div>

    <div id="screen-2" class="screen">
        <h2>Make a wish!</h2>
        <div class="cake-container">
            <div id="flame" class="flame"></div>
            <div class="candle"></div>
            <div class="cake-icing"></div>
            <div class="cake-base"></div>
        </div>
        <p class="hint">(แตะที่ไฟเพื่อเป่าเทียนเลย!)</p>
    </div>

    <div id="screen-3" class="screen">
        <h1 class="pixel-text-red">HAPPY BIRTHDAY!</h1>
        <div class="message-box">
            <p>สุขสันต์วันเกิดนะคนเก่ง 🎂</p>
            <p>ขอให้ปีนี้เป็นปีที่น่ารักสำหรับเธอ</p>
            <p>มีความสุขมากๆ รักน้าาา 💖</p>
        </div>
    </div>
    <audio id="bg-music" loop>
        <source src="music/Happy Birthday (8-Bit).mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
